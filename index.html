<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beach SummonBot</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(to bottom, #00c6ff, #0072ff 40%, #fdd79a 80%, #f7c873);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    overflow: hidden;
}

.container {
    width: 95%;
    max-width: 420px;
    padding: 25px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.3);
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    text-align: center;
}

h1 {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 10px;
}

.status {
    font-size: 14px;
    opacity: 0.9;
    margin-bottom: 20px;
}

/* Map */
.map {
    position: relative;
    height: 200px;
    border-radius: 15px;
    background: linear-gradient(to bottom, #0093E9, #80D0C7);
    overflow: hidden;
    margin-bottom: 20px;
}

/* Base */
.base {
    position: absolute;
    bottom: 10px;
    left: 10px;
    width: 25px;
    height: 25px;
    background: #ffcc70;
    border-radius: 50%;
    box-shadow: 0 0 15px #ffcc70;
}

/* User */
.user {
    position: absolute;
    top: 15px;
    right: 15px;
    width: 25px;
    height: 25px;
    background: #ff6ec7;
    border-radius: 50%;
    box-shadow: 0 0 15px #ff6ec7;
}

/* Bot */
.bot {
    position: absolute;
    bottom: 10px;
    left: 10px;
    width: 25px;
    height: 25px;
    background: #ffffff;
    border-radius: 50%;
    box-shadow: 0 0 20px #ffffff;
    transition: transform 3s ease-in-out;
}

/* Buttons */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 30px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    background: linear-gradient(45deg, #ff9966, #ff5e62);
    color: white;
    margin-top: 8px;
    transition: 0.3s ease;
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
}

button:hover {
    transform: scale(1.05);
}

input {
    width: 100%;
    padding: 10px;
    border-radius: 20px;
    border: none;
    text-align: center;
    margin-top: 12px;
    font-size: 14px;
}

/* Calibration Status Colors */
.calibrate-status {
    font-size: 12px;
    margin-top: 8px;
    font-weight: 600;
}

.error { color: #ff4d4d; }
.success { color: #4CAF50; }
.warning { color: #ff4d4d; }

/* Sand */
.sand {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
    overflow: hidden;
}

.sand-particle {
    position: absolute;
    width: 3px;
    height: 3px;
    background: rgba(255, 230, 180, 0.8);
    border-radius: 50%;
    opacity: 0.8;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% { transform: translateY(0px) translateX(0px); opacity: 0.8; }
    50% { opacity: 0.3; }
    100% { transform: translateY(-200px) translateX(50px); opacity: 0; }
}

.footer {
    font-size: 11px;
    margin-top: 15px;
    opacity: 0.7;
    color: black;
}
</style>
</head>

<body>

<div class="container">
    <h1>SummonBot</h1>
    <div class="status" id="status">Status: Awaiting command</div>

    <div class="map">
        <div class="base"></div>
        <div class="user"></div>
        <div class="bot" id="bot"></div>
        <div class="sand"></div>
    </div>

    <button id="actionBtn">SUMMON</button>

    <input type="number" id="distanceInput" placeholder="Enter distance (meters)">
    <button id="calibrateBtn">CALIBRATE DISTANCE</button>
    <div id="calibrateStatus" class="calibrate-status"></div>

    <div class="footer">
        Coastal Autonomous Service System
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
