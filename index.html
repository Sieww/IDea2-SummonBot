<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beach SummonBot</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(to bottom,#a3d5ff 0%,#88c9d0 50%,#fbe8c6 100%);
}

.container{
    width:95%;
    max-width:420px;
    padding:32px;
    border-radius:28px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.18);
    border:1px solid rgba(255,255,255,0.25);
    box-shadow:0 18px 50px rgba(0,0,0,0.15);
    text-align:center;
}

h2{
    margin-bottom:18px;
    font-weight:700;
    color:#2b3a67;
}

.status{
    font-size:14px;
    margin-bottom:18px;
    color:#2b3a67;
    min-height:20px;
}

.card{
    background:rgba(255,255,255,0.25);
    padding:14px;
    border-radius:18px;
    margin-bottom:14px;
    box-shadow: inset 0 1px 6px rgba(255,255,255,0.4);
}

.label{
    font-size:12px;
    font-weight:500;
    color:#2b3a67;
}

.value{
    font-size:20px;
    font-weight:700;
    color:#2b3a67;
    margin-top:4px;
}

.progress-bar{
    width:100%;
    height:10px;
    background:rgba(255,255,255,0.5);
    border-radius:20px;
    margin-top:10px;
    overflow:hidden;
}

.progress-fill{
    height:100%;
    width:40%;
    background: linear-gradient(135deg,#ffd9a6,#ffbfa3);
    border-radius:20px;
    transition: width 0.4s ease;
    box-shadow:0 0 8px rgba(255,191,163,0.6);
}

.map{
    position:relative;
    height:220px;
    border-radius:24px;
    background: linear-gradient(to bottom,#b3e5fc 0%,#c8f0e3 60%,#fceacc 100%);
    margin:18px 0;
    overflow:hidden;
    box-shadow: inset 0 0 18px rgba(255,255,255,0.4);
}

.base, .bot, .user{
    position:absolute;
    width:30px;
    height:30px;
    border-radius:50%;
}

.base{
    bottom:15px;
    left:15px;
    background:#ffd580;
    box-shadow:0 0 12px #ffd58088;
}

.bot{
    bottom:15px;
    left:15px;
    background:white;
    box-shadow:0 0 18px rgba(255,255,255,0.8);
    transition: transform 3s cubic-bezier(.65,.05,.36,1);
}

.user{
    top:20px;
    right:20px;
    background:#ff9fb3;
    box-shadow:0 0 12px #ff9fb388;
}

button{
    width:100%;
    padding:15px;
    border-radius:35px;
    border:none;
    font-weight:600;
    cursor:pointer;
    background: linear-gradient(135deg,#ffd9a6,#ffbfa3);
    color:#2b3a67;
    transition: all 0.25s ease;
    box-shadow:0 6px 15px rgba(0,0,0,0.1);
}

button:hover:not(:disabled){
    transform:scale(1.05);
}

button:disabled{
    opacity:0.6;
}

.footer{
    font-size:11px;
    margin-top:15px;
    opacity:0.7;
    color:#2b3a67;
}
</style>
</head>

<body>

<div class="container">

    <h2>Beach SummonBot</h2>

    <div class="status" id="status">Ready for deployment.</div>

    <div class="card">
        <div class="label">ETA</div>
        <div class="value" id="eta">--</div>
    </div>

    <div class="card">
        <div class="label">Bin Capacity</div>
        <div class="value" id="capacityText">40%</div>
        <div class="progress-bar">
            <div class="progress-fill" id="capacityBar"></div>
        </div>
    </div>

    <div class="map">
        <div class="base"></div>
        <div class="bot" id="bot"></div>
        <div class="user"></div>
    </div>

    <button id="actionBtn">SUMMON BOT</button>

    <div class="footer">
        Coastal Autonomous Service System
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
